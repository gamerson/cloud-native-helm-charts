{{- $crossplaneNamespace := .Values.crossplaneNamespace -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    annotations:
        argocd.argoproj.io/sync-wave: "-100"
    labels:
        rbac.crossplane.io/aggregate-to-crossplane: "true"
    name: crossplane-provider-kubernetes
rules:
    -   apiGroups: [""]
        resources: ["configmaps", "secrets", "serviceaccounts"]
        verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
    -   apiGroups: [""]
        resources: ["namespaces"]
        verbs: ["get", "list"]
    -   apiGroups: ["rbac.authorization.k8s.io"]
        resources: ["clusterroles"]
        verbs: ["bind", "get", "list", "watch"]
    -   apiGroups: ["rbac.authorization.k8s.io"]
        resources: ["rolebindings"]
        verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
    annotations:
        argocd.argoproj.io/sync-wave: "-100"
    name: crossplane-provider-kubernetes-binding
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: ClusterRole
    name: crossplane-provider-kubernetes
subjects:
    -   kind: ServiceAccount
        name: provider-kubernetes
        namespace: {{ $crossplaneNamespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    annotations:
        argocd.argoproj.io/sync-wave: "-100"
    labels:
        rbac.crossplane.io/aggregate-to-crossplane: "true"
    name: crossplane-provider-aws
rules:
    -   apiGroups:
            -   "aws.m.upbound.io"
            -   "backup.aws.m.upbound.io"
            -   "ec2.aws.m.upbound.io"
            -   "iam.aws.m.upbound.io"
            -   "opensearch.aws.m.upbound.io"
            -   "rds.aws.m.upbound.io"
            -   "s3.aws.m.upbound.io"
        resources: ["*"]
        verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
    annotations:
        argocd.argoproj.io/sync-wave: "-100"
    name: crossplane-provider-aws-binding
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: ClusterRole
    name: crossplane-provider-aws
subjects:
    -   kind: ServiceAccount
        name: provider-aws-backup
        namespace: {{ $crossplaneNamespace }}
    -   kind: ServiceAccount
        name: provider-aws-ec2
        namespace: {{ $crossplaneNamespace }}
    -   kind: ServiceAccount
        name: provider-aws-iam
        namespace: {{ $crossplaneNamespace }}
    -   kind: ServiceAccount
        name: provider-aws-opensearch
        namespace: {{ $crossplaneNamespace }}
    -   kind: ServiceAccount
        name: provider-aws-rds
        namespace: {{ $crossplaneNamespace }}
    -   kind: ServiceAccount
        name: provider-aws-s3
        namespace: {{ $crossplaneNamespace }}