apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
    annotations:
        argocd.argoproj.io/sync-wave: "-90"
    name: gcp-cloudplatform-config
spec:
    deploymentTemplate:
        spec:
            selector:
                matchLabels:
                    pkg.crossplane.io/provider: provider-gcp-cloudplatform
            template:
                metadata:
                    annotations:
                        instrumentation.opentelemetry.io/inject-dotnet: "false"
                        instrumentation.opentelemetry.io/inject-java: "false"
                        instrumentation.opentelemetry.io/inject-nodejs: "false"
                        instrumentation.opentelemetry.io/inject-python: "false"
                        sidecar.opentelemetry.io/inject: "false"
                    labels:
                        pkg.crossplane.io/provider: provider-gcp-cloudplatform
                spec:
                    containers:
                        -   name: package-runtime
                            resources:
                                limits:
                                    cpu: 1000m
                                    memory: 2Gi
                                requests:
                                    cpu: 250m
                                    memory: 512Mi
                            {{- include "crossplane-runtime-configs.containerSecurityContext" . | nindent 28 }}
                    {{- include "crossplane-runtime-configs.podSecurityContext" . | nindent 20 }}
                    serviceAccountName: provider-gcp-cloudplatform
    serviceAccountTemplate:
        metadata:
            annotations:
                iam.gke.io/gcp-service-account: {{ printf "%s-cp-iam@%s.iam.gserviceaccount.com" .Values.deploymentName .Values.gcp.projectId }}
            name: provider-gcp-cloudplatform
---
